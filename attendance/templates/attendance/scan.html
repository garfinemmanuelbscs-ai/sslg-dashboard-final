{% extends "admin/base_site.html" %}
{% block content %}
<div class="text-center" style="text-align: center; padding: 20px;">
    <h2>Facial Recognition Attendance</h2>
    <div style="position: relative; display: inline-block;">
        <video id="webcam" autoplay playsinline width="640" height="480" class="border" style="background: #000;"></video>
    </div>
    <br>
    <button id="scan-btn" onclick="capture()" class="btn btn-primary mt-3" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">Scan Face</button>
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="result" class="mt-3" style="font-weight: bold; font-size: 1.2rem; margin-top: 15px;"></div>
</div>

<script>
    const video = document.getElementById('webcam');
    const resultDiv = document.getElementById('result');
    const scanBtn = document.getElementById('scan-btn');

    // Access the webcam
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => { video.srcObject = stream; })
        .catch(err => {
            console.error("Webcam Error: ", err);
            resultDiv.innerText = "Error: Webcam not found.";
        });

    function capture() {
        const canvas = document.getElementById('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        // Use JPEG for smaller payload and better compatibility with DeepFace
        const dataUrl = canvas.toDataURL('image/jpeg', 0.9);

        // Update UI to show we are working
        resultDiv.innerText = "Processing... Please hold still.";
        resultDiv.style.color = "orange";
        scanBtn.disabled = true;

        fetch('/attendance/verify/', {
            method: 'POST',
            body: JSON.stringify({ image: dataUrl }),
            headers: { 
                'Content-Type': 'application/json', 
                'X-CSRFToken': '{{ csrf_token }}' 
            }
        })
        .then(res => res.json())
        .then(data => {
            scanBtn.disabled = false;
            if (data.status === 'success') {
                resultDiv.innerText = '✅ Success: Welcome ' + data.name;
                resultDiv.style.color = "green";
            } else {
                resultDiv.innerText = '❌ ' + (data.message || 'Face not recognized. Try again.');
                resultDiv.style.color = "red";
            }
        })
        .catch(err => {
            scanBtn.disabled = false;
            console.error("Fetch Error:", err);
            resultDiv.innerText = "Server Error. Check console.";
            resultDiv.style.color = "red";
        });
    }
</script>
{% endblock %}
